name: Build PDFium for Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target_cpu:
        description: 'Target ABI'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build python3 pkg-config wget curl unzip binutils

      - name: Setup Android NDK
        run: |
          NDK_VERSION=r25c
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "NDK_ROOT=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH
          cd $HOME/depot_tools
          DEPOT_TOOLS_UPDATE=1 ./update_depot_tools

      - name: Cache PDFium source
        uses: actions/cache@v4
        id: cache-pdfium
        with:
          path: ~/pdfium_build
          key: pdfium-source-v6-clean
          restore-keys: pdfium-source-v6-clean

      - name: Fetch PDFium source
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        timeout-minutes: 60
        run: |
          mkdir -p $HOME/pdfium_build && cd $HOME/pdfium_build
          gclient config --unmanaged https://pdfium.googlesource.com/pdfium.git
          echo 'target_os = ["android"]' >> .gclient
          gclient sync --no-history --nohooks
          gclient runhooks

      - name: Build
        timeout-minutes: 90
        run: |
          ABI="${{ inputs.target_cpu || 'arm64-v8a' }}"
          case $ABI in
            arm64-v8a)   CPU=arm64 ;;
            armeabi-v7a) CPU=arm   ;;
          esac

          cd $HOME/pdfium_build/pdfium

          # 修复编译警告
          FILE=core/fpdfapi/page/cpdf_psengine.cpp
          grep -q "Wunsafe-buffer-usage" $FILE || \
            sed -i '1s/^/#pragma clang diagnostic ignored "-Wunsafe-buffer-usage"\n/' $FILE

          # 清除旧编译结果，强制重新编译
          rm -rf out/android_${ABI}
          mkdir -p out/android_${ABI}

          cat > out/android_${ABI}/args.gn << EOF
          target_os = "android"
          target_cpu = "${CPU}"
          is_debug = false
          is_component_build = false
          pdf_is_standalone = true
          pdf_enable_v8 = false
          pdf_enable_xfa = false
          use_custom_libcxx = false
          use_remoteexec = false
          treat_warnings_as_errors = false
          EOF

          gn gen out/android_${ABI}
          ninja -j4 -C out/android_${ABI} pdfium
          echo "✅ Static lib done"

          # 列出所有 .a 文件确认存在
          echo "=== Static libs ==="
          find out/android_${ABI}/obj -name "*.a" | head -10

          # NDK 工具链
          SYSROOT=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          CC=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang++

          # 收集所有 .a 文件
          STATIC_LIBS=$(find out/android_${ABI}/obj -name "*.a" | tr '\n' ' ')

          # 先不用 version script，直接导出所有符号看看
          $CC -shared -fPIC \
            --sysroot=$SYSROOT \
            -Wl,--whole-archive $STATIC_LIBS -Wl,--no-whole-archive \
            -Wl,-z,defs \
            -lunwind \
            -o out/android_${ABI}/libpdfium.so

          echo "✅ Shared lib:"
          ls -lh out/android_${ABI}/libpdfium.so

          # 验证符号
          echo "=== 所有导出符号数量 ==="
          nm -D out/android_${ABI}/libpdfium.so | grep " T " | wc -l

          echo "=== FPDF_ 符号 ==="
          nm -D out/android_${ABI}/libpdfium.so | grep "FPDF_Init" || echo "❌ 未找到"

          # 收集产物
          mkdir -p $HOME/output/${ABI}/include
          cp out/android_${ABI}/libpdfium.so $HOME/output/${ABI}/
          cp public/*.h $HOME/output/${ABI}/include/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpdfium-android-${{ inputs.target_cpu || 'arm64-v8a' }}
          path: ~/output/${{ inputs.target_cpu || 'arm64-v8a' }}/
          retention-days: 30

name: Build PDFium for Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target_cpu:
        description: 'Target ABI'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 pkg-config wget curl unzip

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH
          cd $HOME/depot_tools
          DEPOT_TOOLS_UPDATE=1 ./update_depot_tools

      - name: Cache PDFium source
        uses: actions/cache@v4
        id: cache-pdfium
        with:
          path: ~/pdfium_build
          key: pdfium-source-v8
          restore-keys: pdfium-source-v8

      - name: Fetch PDFium source
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        timeout-minutes: 60
        run: |
          mkdir -p $HOME/pdfium_build && cd $HOME/pdfium_build
          gclient config --unmanaged https://pdfium.googlesource.com/pdfium.git
          echo 'target_os = ["android"]' >> .gclient
          gclient sync --no-history --nohooks
          gclient runhooks

      - name: Patch BUILD.gn
        run: |
          cd $HOME/pdfium_build/pdfium

          # 修复 unsafe buffer 警告
          FILE=core/fpdfapi/page/cpdf_psengine.cpp
          grep -q "Wunsafe-buffer-usage" $FILE || \
            sed -i '1s/^/#pragma clang diagnostic ignored "-Wunsafe-buffer-usage"\n/' $FILE

          # 关键两步：加 fvisibility=default 和 FPDFSDK_EXPORTS
          python3 patch_build.py

          # 添加 shared_library target
          if ! grep -q "pdfium_shared" BUILD.gn; then
            printf '\nshared_library("pdfium_shared") {\n  deps = [ ":pdfium" ]\n  output_name = "pdfium"\n  configs -= [ "//build/config/android:hide_all_but_jni_onload" ]\n}\n' >> BUILD.gn
          fi

          echo "✅ BUILD.gn patched"
          grep -A3 "pdfium_common_config" BUILD.gn | head -6

        env:
          PATCH_SCRIPT: |
            import re
            with open("BUILD.gn", "r") as f:
                content = f.read()
            if 'fvisibility=default' not in content:
                content = content.replace(
                    'config("pdfium_common_config") {',
                    'config("pdfium_common_config") {\n  cflags = [ "-fvisibility=default" ]'
                )
            if 'FPDFSDK_EXPORTS' not in content:
                content = content.replace(
                    '"PNG_USE_READ_MACROS",',
                    '"PNG_USE_READ_MACROS",\n    "FPDFSDK_EXPORTS",'
                )
            with open("BUILD.gn", "w") as f:
                f.write(content)
            print("Done")

      - name: Write patch script
        run: |
          cat > $HOME/pdfium_build/pdfium/patch_build.py << 'EOF'
          with open("BUILD.gn", "r") as f:
              content = f.read()
          if 'fvisibility=default' not in content:
              content = content.replace(
                  'config("pdfium_common_config") {',
                  'config("pdfium_common_config") {\n  cflags = [ "-fvisibility=default" ]'
              )
          if 'FPDFSDK_EXPORTS' not in content:
              content = content.replace(
                  '"PNG_USE_READ_MACROS",',
                  '"PNG_USE_READ_MACROS",\n    "FPDFSDK_EXPORTS",'
              )
          with open("BUILD.gn", "w") as f:
              f.write(content)
          print("BUILD.gn patched successfully")
          EOF

      - name: Apply patch
        run: |
          cd $HOME/pdfium_build/pdfium
          python3 patch_build.py

          # 添加 shared_library target
          if ! grep -q "pdfium_shared" BUILD.gn; then
            printf '\nshared_library("pdfium_shared") {\n  deps = [ ":pdfium" ]\n  output_name = "pdfium"\n  configs -= [ "//build/config/android:hide_all_but_jni_onload" ]\n}\n' >> BUILD.gn
          fi

          echo "=== 验证 patch ==="
          grep "fvisibility" BUILD.gn | head -3
          grep "FPDFSDK_EXPORTS" BUILD.gn | head -3
          grep "pdfium_shared" BUILD.gn | head -3

      - name: Configure
        run: |
          ABI="${{ inputs.target_cpu || 'arm64-v8a' }}"
          case $ABI in
            arm64-v8a)   CPU=arm64 ;;
            armeabi-v7a) CPU=arm   ;;
          esac

          cd $HOME/pdfium_build/pdfium
          rm -rf out/android_${ABI}
          mkdir -p out/android_${ABI}

          cat > out/android_${ABI}/args.gn << EOF
          target_os = "android"
          target_cpu = "${CPU}"
          is_debug = false
          is_component_build = false
          pdf_is_standalone = true
          pdf_enable_v8 = false
          pdf_enable_xfa = false
          use_custom_libcxx = false
          use_remoteexec = false
          treat_warnings_as_errors = false
          EOF

          gn gen out/android_${ABI}

      - name: Build
        timeout-minutes: 90
        run: |
          ABI="${{ inputs.target_cpu || 'arm64-v8a' }}"
          cd $HOME/pdfium_build/pdfium
          ninja -j4 -C out/android_${ABI} pdfium_shared

          echo "=== 编译产物 ==="
          find out/android_${ABI} -name "*.so"

          echo "=== 验证符号 ==="
          SO=$(find out/android_${ABI} -name "libpdfium.so" | grep -v unstripped | head -1)
          nm -D "$SO" | grep "FPDF_Init" && echo "✅ 符号导出成功" || echo "❌ 符号未导出"

      - name: Collect output
        run: |
          ABI="${{ inputs.target_cpu || 'arm64-v8a' }}"
          mkdir -p $HOME/output/${ABI}/include
          SO=$(find $HOME/pdfium_build/pdfium/out/android_${ABI} -name "libpdfium.so" | grep -v unstripped | head -1)
          cp "$SO" $HOME/output/${ABI}/libpdfium.so
          cp $HOME/pdfium_build/pdfium/public/*.h $HOME/output/${ABI}/include/
          ls -lh $HOME/output/${ABI}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpdfium-android-${{ inputs.target_cpu || 'arm64-v8a' }}
          path: ~/output/${{ inputs.target_cpu || 'arm64-v8a' }}/
          retention-days: 30

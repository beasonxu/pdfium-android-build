name: Build PDFium for Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target_cpu:
        description: 'Target CPU (arm64|arm)'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - arm

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      PDFium_TARGET_OS: android
      PDFium_TARGET_CPU: ${{ inputs.target_cpu || 'arm64' }}
      PDFium_IS_DEBUG: false
      PDFium_ENABLE_V8: false
      PDFium_SOURCE_DIR: pdfium
      PDFium_BUILD_DIR: pdfium/out

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 curl wget

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH
          cd $HOME/depot_tools
          DEPOT_TOOLS_UPDATE=1 ./update_depot_tools

      - name: Cache PDFium source
        uses: actions/cache@v4
        id: cache-pdfium
        with:
          path: pdfium
          key: pdfium-source-v10
          restore-keys: pdfium-source-v10

      - name: Checkout PDFium
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        timeout-minutes: 60
        run: |
          gclient config --unmanaged https://pdfium.googlesource.com/pdfium.git
          echo 'target_os = ["android"]' >> .gclient
          gclient sync --no-history --nohooks
          gclient runhooks

      - name: Apply patch
        run: |
          cd pdfium
          python3 $GITHUB_WORKSPACE/patch_build.py

      - name: Configure
        run: |
          mkdir -p pdfium/out
          cat > pdfium/out/args.gn << EOF
          is_debug = false
          pdf_is_standalone = true
          pdf_use_partition_alloc = false
          target_cpu = "${{ inputs.target_cpu || 'arm64' }}"
          target_os = "android"
          pdf_enable_v8 = false
          pdf_enable_xfa = false
          treat_warnings_as_errors = false
          is_component_build = false
          clang_use_chrome_plugins = false
          default_min_sdk_version = 23
          EOF

          cd pdfium
          gn gen out

      - name: Build
        timeout-minutes: 90
        run: |
          ninja -j4 -C pdfium/out pdfium

          echo "=== 编译产物 ==="
          find pdfium/out -name "*.so" | head -10

          echo "=== 验证符号 ==="
          SO=$(find pdfium/out -name "libpdfium.so" | grep -v unstripped | head -1)
          echo "SO: $SO"
          nm -D "$SO" | grep "FPDF_Init" && echo "✅ 符号导出成功" || echo "❌ 符号未导出"

      - name: Collect output
        run: |
          ABI=${{ inputs.target_cpu || 'arm64' }}
          [ "$ABI" == "arm64" ] && ABI_DIR="arm64-v8a" || ABI_DIR="armeabi-v7a"

          mkdir -p output/${ABI_DIR}/include
          SO=$(find pdfium/out -name "libpdfium.so" | grep -v unstripped | head -1)
          cp "$SO" output/${ABI_DIR}/libpdfium.so
          cp pdfium/public/*.h output/${ABI_DIR}/include/
          ls -lh output/${ABI_DIR}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpdfium-android-${{ inputs.target_cpu || 'arm64' }}
          path: output/
          retention-days: 30

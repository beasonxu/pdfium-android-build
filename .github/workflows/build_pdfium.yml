name: Build PDFium for Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target_cpu:
        description: 'Target ABI'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 pkg-config wget curl unzip

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH
          cd $HOME/depot_tools
          DEPOT_TOOLS_UPDATE=1 ./update_depot_tools

      - name: Cache PDFium source
        uses: actions/cache@v4
        id: cache-pdfium
        with:
          path: ~/pdfium_build
          key: pdfium-source-v7
          restore-keys: pdfium-source-v7

      - name: Fetch PDFium source
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        timeout-minutes: 60
        run: |
          mkdir -p $HOME/pdfium_build && cd $HOME/pdfium_build
          gclient config --unmanaged https://pdfium.googlesource.com/pdfium.git
          echo 'target_os = ["android"]' >> .gclient
          gclient sync --no-history --nohooks
          gclient runhooks

      - name: Patch source
        run: |
          cd $HOME/pdfium_build/pdfium

          # 修复 unsafe buffer 警告
          FILE=core/fpdfapi/page/cpdf_psengine.cpp
          grep -q "Wunsafe-buffer-usage" $FILE || \
            sed -i '1s/^/#pragma clang diagnostic ignored "-Wunsafe-buffer-usage"\n/' $FILE

          # 在 BUILD.gn 末尾添加 shared_library target（如果还没有）
          if ! grep -q "pdfium_shared" BUILD.gn; then
            cat >> BUILD.gn << 'EOF'

          shared_library("pdfium_shared") {
            deps = [ ":pdfium" ]
            output_name = "pdfium"
            # 强制导出所有符号
            configs -= [ "//build/config/android:hide_all_but_jni_onload" ]
            configs -= [ "//build/config/gcc:symbol_visibility_hidden" ]
          }
          EOF
          fi
          echo "✅ Patched"

      - name: Configure
        run: |
          ABI="${{ inputs.target_cpu || 'arm64-v8a' }}"
          case $ABI in
            arm64-v8a)   CPU=arm64 ;;
            armeabi-v7a) CPU=arm   ;;
          esac

          cd $HOME/pdfium_build/pdfium
          rm -rf out/android_${ABI}
          mkdir -p out/android_${ABI}

          cat > out/android_${ABI}/args.gn << EOF
          target_os = "android"
          target_cpu = "${CPU}"
          is_debug = false
          is_component_build = false
          pdf_is_standalone = true
          pdf_enable_v8 = false
          pdf_enable_xfa = false
          use_custom_libcxx = false
          use_remoteexec = false
          treat_warnings_as_errors = false
          EOF

          gn gen out/android_${ABI}

      - name: Build shared library
        timeout-minutes: 90
        run: |
          ABI="${{ inputs.target_cpu || 'arm64-v8a' }}"
          cd $HOME/pdfium_build/pdfium
          ninja -j4 -C out/android_${ABI} pdfium_shared

          echo "=== 编译产物 ==="
          find out/android_${ABI} -name "*.so"

          echo "=== 验证符号 ==="
          SO=$(find out/android_${ABI} -name "libpdfium.so" | head -1)
          if [ -n "$SO" ]; then
            nm -D $SO | grep "FPDF_Init" && echo "✅ 符号导出成功" || echo "❌ 符号未导出"
          fi

      - name: Collect output
        run: |
          ABI="${{ inputs.target_cpu || 'arm64-v8a' }}"
          mkdir -p $HOME/output/${ABI}/include

          SO=$(find $HOME/pdfium_build/pdfium/out/android_${ABI} -name "libpdfium.so" | head -1)
          echo "Found SO: $SO"
          cp "$SO" $HOME/output/${ABI}/libpdfium.so
          cp $HOME/pdfium_build/pdfium/public/*.h $HOME/output/${ABI}/include/

          ls -lh $HOME/output/${ABI}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpdfium-android-${{ inputs.target_cpu || 'arm64-v8a' }}
          path: ~/output/${{ inputs.target_cpu || 'arm64-v8a' }}/
          retention-days: 30

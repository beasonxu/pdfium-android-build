name: Build PDFium for Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target_cpu:
        description: 'Target CPU architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - arm

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      max-parallel: 1
      matrix:
        target_cpu: ${{ fromJson(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.target_cpu) || '["arm64", "arm"]') }}

    steps:
      # ── 1. 系统依赖 ──────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl python3 python3-pip \
            lsb-release pkg-config \
            libglib2.0-dev

      # ── 2. depot_tools ───────────────────────────────────────────
      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          export PATH="$HOME/depot_tools:$PATH"
          echo "$HOME/depot_tools" >> $GITHUB_PATH
          cd $HOME/depot_tools
          DEPOT_TOOLS_UPDATE=1 ./update_depot_tools
          ls $HOME/depot_tools/python3_bin_reldir.txt

      # ── 3. 缓存 PDFium 源码 ──────────────────────────────────────
      - name: Cache PDFium source
        uses: actions/cache@v4
        id: cache-pdfium
        with:
          path: ~/pdfium_build
          key: pdfium-source-v4
          restore-keys: |
            pdfium-source-

      # ── 4. 拉取 PDFium 源码 ──────────────────────────────────────
      - name: Fetch PDFium source
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        timeout-minutes: 60
        run: |
          mkdir -p $HOME/pdfium_build && cd $HOME/pdfium_build
          gclient config --unmanaged https://pdfium.googlesource.com/pdfium.git
          echo 'target_os = ["android"]' >> .gclient
          gclient sync --no-history --nohooks
          gclient runhooks

      # ── 5. 添加 shared_library target 到 BUILD.gn ────────────────
      - name: Patch BUILD.gn to add shared library target
        run: |
          cd $HOME/pdfium_build/pdfium
          # 在 BUILD.gn 末尾追加 shared_library target
          cat >> BUILD.gn << 'EOF'

          shared_library("pdfium_shared") {
            deps = [ ":pdfium" ]
            ldflags = [ "-latomic" ]
            if (target_os == "android") {
              configs -= [ "//build/config/android:hide_all_but_jni_onload" ]
            }
          }
          EOF
          echo "✅ BUILD.gn patched"
          tail -10 BUILD.gn

      # ── 6. 修复 unsafe buffer 编译错误 ───────────────────────────
      - name: Patch cpdf_psengine.cpp
        run: |
          FILE=$HOME/pdfium_build/pdfium/core/fpdfapi/page/cpdf_psengine.cpp
          sed -i '1s/^/#pragma clang diagnostic ignored "-Wunsafe-buffer-usage"\n/' $FILE

      # ── 7. 生成编译配置 ──────────────────────────────────────────
      - name: Configure build (${{ matrix.target_cpu }})
        run: |
          cd $HOME/pdfium_build/pdfium
          mkdir -p out/android_${{ matrix.target_cpu }}

          cat > out/android_${{ matrix.target_cpu }}/args.gn << 'EOF'
          target_os = "android"
          target_cpu = "${{ matrix.target_cpu }}"
          is_debug = false
          is_component_build = false
          pdf_is_standalone = true
          pdf_enable_v8 = false
          pdf_enable_xfa = false
          use_custom_libcxx = false
          use_remoteexec = false
          treat_warnings_as_errors = false
          EOF

          gn gen out/android_${{ matrix.target_cpu }}

      # ── 8. 编译 shared library ───────────────────────────────────
      - name: Build PDFium (${{ matrix.target_cpu }})
        timeout-minutes: 60
        run: |
          cd $HOME/pdfium_build/pdfium
          ninja -j4 -C out/android_${{ matrix.target_cpu }} pdfium_shared
          echo "✅ Build complete, searching for .so:"
          find out/android_${{ matrix.target_cpu }} -name "*.so"

      # ── 9. 收集产物 ──────────────────────────────────────────────
      - name: Collect output
        run: |
          mkdir -p $HOME/output/${{ matrix.target_cpu }}/include

          SO_FILE=$(find $HOME/pdfium_build/pdfium/out -name "libpdfium_shared.so" | head -1)
          echo "Found: $SO_FILE"
          # 重命名为 libpdfium.so 方便使用
          cp "$SO_FILE" $HOME/output/${{ matrix.target_cpu }}/libpdfium.so

          cp $HOME/pdfium_build/pdfium/public/*.h \
             $HOME/output/${{ matrix.target_cpu }}/include/

          echo "✅ Output:"
          ls -lh $HOME/output/${{ matrix.target_cpu }}/

      # ── 10. 上传产物 ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpdfium-android-${{ matrix.target_cpu }}
          path: ~/output/${{ matrix.target_cpu }}/
          retention-days: 30
